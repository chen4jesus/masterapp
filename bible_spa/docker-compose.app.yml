# =============================================================================
# Bible SPA — docker-compose.app.yml
# =============================================================================
# Pure static web app served by Caddy.
#
# Production:
#   docker compose -f docker-compose.app.yml up -d --build
#
# The container joins the shared 'faithconnect' network so the master Caddy
# (faithconnect-caddy) can reverse-proxy to it by container name.
# =============================================================================

services:
  bible-spa:
    build:
      context: .
    container_name: bible-spa
    restart: unless-stopped

    expose:
      - "80"

    # Inject production config at runtime — keeps secrets off the image layer.
    # Create config.production.json on the host before running docker compose up.
    volumes:
      - ./config.production.json:/srv/config.json:ro

    networks:
      - faithconnect

# Attach to the master shared network created by docker-compose.yml
networks:
  faithconnect:
    external: true
